{% extends "layout.html" %}

{% block content %}
<h1 style="text-align:center;">Регистрация нового аккаунта</h1>
<form method="post" action="/register" style="max-width:400px; margin:auto; display:flex; flex-direction:column; gap:10px;">
    <label for="username">Логин:</label>
    <input type="text" id="username" name="username" required>

    <label for="password">Пароль:</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" style="margin-top:10px;">Зарегистрироваться</button>
</form>
<div style="text-align:center; margin-top:15px;">
    <p>Уже есть аккаунт? <a href="/login">Войти</a></p>
</div>
{% endblock %}
