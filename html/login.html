{% extends "layout.html" %}

{% block content %}
<h1 style="text-align:center;">Войти в аккаунт</h1>
<form method="post" action="/login" style="max-width:400px; margin:auto; display:flex; flex-direction:column; gap:10px;">
    <label for="username">Логин:</label>
    <input type="text" id="username" name="username" required>

    <label for="password">Пароль:</label>
    <input type="password" id="password" name="password" required>

    <button type="submit" style="margin-top:10px;">Войти</button>
</form>
<div style="text-align:center; margin-top:15px;">
    <p>Еще нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
</div>
{% endblock %}
